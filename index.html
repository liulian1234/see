<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crash 数据系统（GitHub数据库版）</title>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}
.container{max-width:1000px;margin:auto;}
textarea{width:100%;height:120px;border-radius:10px;padding:10px;}
input{width:100%;padding:10px;border-radius:8px;margin-top:8px;}
button{margin-top:8px;padding:10px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;}
.card{background:#111827;padding:15px;margin-top:15px;border-radius:12px;}
.small{font-size:12px;color:#9ca3af;}
</style>
</head>

<body>
<div class="container">

<h2>📊 Crash GitHub 数据库系统</h2>
<p class="small">仅用于统计分析：频率 / EV / 波动结构（不预测结果）</p>

<h3>⚙️ GitHub 配置</h3>
<input id="repo" placeholder="GitHub repo: username/repo" />
<input id="file" placeholder="文件路径: data.json" />
<input id="token" placeholder="GitHub Token (需要repo权限)" />

<h3>📥 输入数据</h3>
<textarea id="inputData" placeholder="输入倍率，用逗号分隔"></textarea>

<button onclick="analyze()">分析</button>
<button onclick="saveGitHub()">保存到GitHub数据库</button>
<button onclick="loadGitHub()">从GitHub加载数据库</button>

<div id="output"></div>
<div id="history"></div>

</div>

<script>
let db = [];

function analyze(){
  let arr = document.getElementById("inputData").value.split(",")
  .map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));

  let avg = arr.reduce((a,b)=>a+b,0)/arr.length;
  let ev = arr.reduce((a,b)=>a+(b-1)/arr.length,0);

  db.push({data:arr,avg,ev,time:new Date().toISOString()});

  document.getElementById("output").innerHTML =
  `<div class='card'>
    <h3>📊 本次分析</h3>
    <p>数量: ${arr.length}</p>
    <p>平均: ${avg.toFixed(3)}</p>
    <p>EV: ${ev.toFixed(4)}</p>
  </div>`;
}

async function saveGitHub(){
  let repo=document.getElementById("repo").value;
  let file=document.getElementById("file").value;
  let token=document.getElementById("token").value;

  if(!repo||!file||!token) return alert("请填写GitHub信息");

  let url=`https://api.github.com/repos/${repo}/contents/${file}`;

  let getRes=await fetch(url,{headers:{Authorization:`token ${token}`}});
  let sha=null;
  let oldData=[];

  if(getRes.ok){
    let json=await getRes.json();
    sha=json.sha;
    oldData=JSON.parse(atob(json.content));
  }

  let newData=oldData.concat(db);
  let content=btoa(unescape(encodeURIComponent(JSON.stringify(newData,null,2))));

  await fetch(url,{
    method:"PUT",
    headers:{
      "Authorization":`token ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update crash data",
      content:content,
      sha:sha
    })
  });

  alert("已保存到GitHub");
}

async function loadGitHub(){
  let repo=document.getElementById("repo").value;
  let file=document.getElementById("file").value;

  let url=`https://raw.githubusercontent.com/${repo}/main/${file}`;

  let res=await fetch(url);
  let data=await res.json();

  db=data;

  document.getElementById("history").innerHTML=
  `<div class='card'><h3>📁 GitHub 数据</h3>
  <p>记录数: ${db.length}</p></div>`;
}
</script>

</body>
</html>
