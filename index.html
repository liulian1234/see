<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crash 云数据库系统 V2 + V3（分析+可视化版）</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1220,#111827);
  color:#fff;
}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{
  background:rgba(17,24,39,0.85);
  border:1px solid #1f2937;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
}
input{
  width:100%;padding:12px;margin-top:8px;border-radius:10px;border:none;
}
button{
  margin-top:10px;padding:10px 14px;border:none;border-radius:10px;
  cursor:pointer;background:#3b82f6;color:white;font-weight:bold;
}
button:hover{background:#2563eb;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.box{flex:1;min-width:200px;background:#0f172a;padding:10px;border-radius:10px;}
.small{font-size:12px;color:#9ca3af;}
canvas{margin-top:10px;}
</style>
</head>

<body>
<div class="container">

<h2>📊 Crash 数据系统 V2 + V3（风控 + 可视化）</h2>
<p class="small">✔ EV ✔ 波动率 ✔ 区间概率 ✔ 图表分析（不预测未来）</p>

<div class="card">
  <h3>⚙️ Cloud API</h3>
  <input id="api" placeholder="https://your-worker.workers.dev" />
</div>

<div class="card">
  <h3>📥 输入数据</h3>
  <input id="value" placeholder="输入倍率，例如 1.23" />
  <button onclick="add()">添加</button>
  <button onclick="load()">加载数据库</button>
</div>

<div class="card">
  <h3>📊 V2 分析结果</h3>
  <div class="row">
    <div class="box" id="evBox">EV: -</div>
    <div class="box" id="avgBox">AVG: -</div>
    <div class="box" id="varBox">Variance: -</div>
  </div>
</div>

<div class="card">
  <h3>📈 V3 可视化</h3>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>📁 数据记录</h3>
  <div id="list"></div>
</div>

</div>

<script>
let db=[];
let chart=null;

function analyze(){
  let arr=db.map(x=>x.value);
  let n=arr.length;
  if(n===0)return;

  let avg=arr.reduce((a,b)=>a+b,0)/n;
  let ev=arr.reduce((a,b)=>a+(b-1)/n,0);
  let variance=arr.reduce((a,b)=>a+Math.pow(b-avg,2),0)/n;

  document.getElementById("evBox").innerText="EV: "+ev.toFixed(4);
  document.getElementById("avgBox").innerText="AVG: "+avg.toFixed(3);
  document.getElementById("varBox").innerText="Variance: "+variance.toFixed(3);

  let labels=arr.map((_,i)=>i+1);

  if(chart)chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"倍率走势",
        data:arr,
        borderColor:"#3b82f6",
        fill:false
      }]
    }
  });
}

function render(){
  document.getElementById("list").innerHTML=db.map((d,i)=>
    `<div> #${i+1} | ${d.value} | ${d.time}</div>`
  ).join("");
}

async function add(){
  let v=parseFloat(document.getElementById("value").value);
  if(isNaN(v))return;

  let api=document.getElementById("api").value;

  let res=await fetch(api+"/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({value:v})
  });

  db=await res.json();
  render();
  analyze();
}

async function load(){
  let api=document.getElementById("api").value;
  let res=await fetch(api+"/get");
  db=await res.json();
  render();
  analyze();
}
</script>

</body>
</html>

<!-- ================= BACKEND (UNCHANGED SAFE WORKER) =================
Cloudflare Worker (same as V1, GitHub storage)

功能：
- /get 读取数据库
- /add 添加数据
- GitHub data.json 存储

👉 不变原因：已经是安全结构
