<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash Tracker V9</title>

<!-- Excel库 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#0b1220; color:white; font-family:Arial; padding:12px; }
.card { background:#111827; padding:14px; border-radius:14px; margin-bottom:12px; }
input, select {
  width:100%; padding:10px; margin:6px 0;
  border-radius:10px; border:none; background:#1f2937; color:white;
}
button { padding:12px; border:none; border-radius:10px; width:48%; margin:5px; font-weight:bold;}
.win{background:#22c55e;} .lose{background:#ef4444;}
.start{background:#3b82f6; width:100%;}
.stat{background:#1f2937; padding:8px; margin:6px 0; border-radius:8px;}
</style>
</head>

<body>

<div class="card">
<h2>🚀 启动</h2>

<label>本金</label>
<input id="startBalance" type="number">

<label>目标</label>
<input id="targetBalance" type="number">

<label>模式</label>
<select id="mode">
  <option value="A">A 保守</option>
  <option value="B">B 进攻</option>
  <option value="C">C 高风险</option>
  <option value="D">D 自动</option>
</select>

<button class="start" onclick="startSystem()">开始</button>
</div>

<div class="card">
<div class="stat">资金：$<span id="balance">0</span></div>
<div class="stat">利润：$<span id="profit">0</span></div>
<div class="stat">状态：<span id="status">未启动</span></div>
</div>

<div class="card">
<button class="win" onclick="addWin()">WIN</button>
<button class="lose" onclick="addLose()">LOSE</button>
<div class="stat">下注：$<span id="bet">0</span></div>
</div>

<div class="card">
<div class="stat">局数：<span id="total">0</span></div>
<div class="stat">胜率：<span id="rate">0%</span></div>
<div class="stat">连输：<span id="loseStreak">0</span></div>
</div>

<div class="card">
<h3>⏱️ 时间</h3>
<div class="stat">开始：<span id="startTime">-</span></div>
<div class="stat">时长：<span id="duration">00:00:00</span></div>
</div>

<div class="card">
<button class="start" onclick="exportExcel()">📊 导出 Excel</button>
<button class="start" onclick="analyze()">📈 分析</button>
<div class="stat" id="report">暂无分析</div>
</div>

<script>

// ===== 数据 =====
let balance=0, target=0, profit=0;
let total=0, win=0, lose=0;
let loseStreak=0, winStreak=0;
let started=false, stopped=false;
let mode="B";
let risk=0.03;
let logs=[];

// 时间
let startTimestamp=0;
let timer=null;

// ===== 启动 =====
function startSystem(){

  balance = parseFloat(startBalance.value);
  target = parseFloat(targetBalance.value);
  mode = document.getElementById("mode").value;

  if(!balance || !target){
    alert("输入完整");
    return;
  }

  if(mode=="A") risk=0.02;
  if(mode=="B") risk=0.03;
  if(mode=="C") risk=0.05;

  started=true;
  stopped=false;

  total=0; win=0; lose=0;
  profit=0;
  loseStreak=0; winStreak=0;
  logs=[];

  // 时间
  startTimestamp=Date.now();
  startTime.innerText=new Date().toLocaleTimeString();
  if(timer) clearInterval(timer);
  timer=setInterval(updateTimer,1000);

  update();
}

// ===== 自动模式 =====
function autoRisk(){
  if(mode!="D") return;

  if(loseStreak>=4) risk=0.01;
  else if(loseStreak>=2) risk=0.02;
  else if(winStreak>=3) risk=0.04;
  else risk=0.03;
}

// ===== 下注 =====
function bet(){
  autoRisk();
  return balance*risk;
}

// ===== WIN =====
function addWin(){
  if(!started||stopped) return;

  let b=bet();
  let gain=b*2;

  balance+=gain;
  profit+=gain;

  win++; total++;
  winStreak++; loseStreak=0;

  logs.push({
    局数:total,
    结果:"WIN",
    下注:b.toFixed(2),
    盈亏:gain.toFixed(2),
    余额:balance.toFixed(2)
  });

  check();
  update();
}

// ===== LOSE =====
function addLose(){
  if(!started||stopped) return;

  let b=bet();

  balance-=b;
  profit-=b;

  lose++; total++;
  loseStreak++; winStreak=0;

  logs.push({
    局数:total,
    结果:"LOSE",
    下注:b.toFixed(2),
    盈亏:(-b).toFixed(2),
    余额:balance.toFixed(2)
  });

  check();
  update();
}

// ===== 风控 =====
function check(){
  if(balance>=target){
    stopped=true;
    status.innerText="达标";
  }
  if(balance<=0){
    stopped=true;
    status.innerText="爆仓";
  }
}

// ===== 时间 =====
function updateTimer(){
  let diff=Math.floor((Date.now()-startTimestamp)/1000);
  let h=String(Math.floor(diff/3600)).padStart(2,'0');
  let m=String(Math.floor((diff%3600)/60)).padStart(2,'0');
  let s=String(diff%60).padStart(2,'0');
  duration.innerText=`${h}:${m}:${s}`;
}

// ===== 导出Excel =====
function exportExcel(){

  if(!started){
    alert("还没开始");
    return;
  }

  let ws = XLSX.utils.json_to_sheet(logs);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Logs");

  XLSX.writeFile(wb, "crash_logs.xlsx");
}

// ===== 分析 =====
function analyze(){

  if(!started){
    alert("还没开始");
    return;
  }

  let text="";

  if(profit>0) text+="✅ 盈利\n";
  else text+="❌ 亏损\n";

  let rate=total?(win/total*100):0;

  if(rate<40) text+="⚠️ 胜率低\n";
  if(loseStreak>=3) text+="❌ 连输问题严重\n";
  if(mode=="C") text+="⚠️ 风险过高\n";
  if(mode=="D") text+="✅ 自动模式较稳\n";

  text+="\n结论：";

  if(profit<0 && loseStreak>=3){
    text+="连输未控制";
  }else if(mode=="C"){
    text+="模式过激";
  }else{
    text+="随机波动";
  }

  report.innerText=text;
}

// ===== UI =====
function update(){

  balanceSpan = document.getElementById("balance");
  balanceSpan.innerText=balance.toFixed(2);

  profitSpan=document.getElementById("profit");
  profitSpan.innerText=profit.toFixed(2);

  totalSpan=document.getElementById("total");
  totalSpan.innerText=total;

  let rate=total?(win/total*100):0;
  document.getElementById("rate").innerText=rate.toFixed(1)+"%";

  document.getElementById("loseStreak").innerText=loseStreak;
  document.getElementById("bet").innerText=bet().toFixed(2);
}

</script>

</body>
</html>
