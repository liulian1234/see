<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crash 云数据库系统（安全无Token版）</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1220,#111827);
  color:#fff;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.card{
  background:rgba(17,24,39,0.85);
  border:1px solid #1f2937;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
}
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}
button{
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
  font-weight:bold;
}
button:hover{background:#2563eb;}
.list{
  margin-top:10px;
  max-height:300px;
  overflow:auto;
}
.item{
  padding:8px;
  border-bottom:1px solid #2d3748;
  display:flex;
  justify-content:space-between;
}
.small{font-size:12px;color:#9ca3af;}
</style>
</head>

<body>
<div class="container">

<h2>📊 Crash 云数据库系统（安全版）</h2>
<p class="small">✔ 无Token暴露 ✔ 云端同步 ✔ GitHub数据库 ✔ 多设备同步</p>

<div class="card">
  <h3>⚙️ 云端配置</h3>
  <input id="api" placeholder="Cloud Worker API URL（例如 https://xxx.workers.dev）" />
</div>

<div class="card">
  <h3>📥 输入每局数据</h3>
  <input id="value" placeholder="输入倍率，例如 1.23" />
  <button onclick="addValue()">添加记录</button>
  <button onclick="loadData()">加载云数据库</button>
</div>

<div class="card">
  <h3>📁 数据记录</h3>
  <div id="list" class="list"></div>
</div>

</div>

<script>
let db = [];

function render(){
  document.getElementById("list").innerHTML = db.map((d,i)=>
    `<div class='item'><span>#${i+1} ${d.value}</span><span>${d.time}</span></div>`
  ).join("");
}

async function addValue(){
  let v = parseFloat(document.getElementById("value").value);
  if(isNaN(v)) return alert("请输入数字");

  let api = document.getElementById("api").value;

  let res = await fetch(api + "/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({value:v})
  });

  let data = await res.json();
  db = data;
  render();
}

async function loadData(){
  let api = document.getElementById("api").value;

  let res = await fetch(api + "/get");
  db = await res.json();
  render();
}
</script>

</body>
</html>

<!-- ================= CLOUD WORKER (GitHub Secure Backend) =================

你需要部署这个 Worker（Cloudflare Workers）

功能：
- GitHub token 存在 server（不会暴露）
- index.html 只调用 API
- 数据存储 GitHub data.json

================= worker.js =================

export default {
  async fetch(req, env) {

    const url = new URL(req.url);

    const GITHUB_REPO = env.REPO;
    const GITHUB_TOKEN = env.TOKEN;
    const FILE = "data.json";

    async function getData(){
      let r = await fetch(
        `https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE}`,
        {headers:{Authorization:`token ${GITHUB_TOKEN}`}}
      );

      if(!r.ok) return [];

      let j = await r.json();
      return JSON.parse(atob(j.content));
    }

    async function saveData(data, sha){
      let content = btoa(JSON.stringify(data,null,2));

      await fetch(
        `https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE}`,
        {
          method:"PUT",
          headers:{
            "Authorization":`token ${GITHUB_TOKEN}`,
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            message:"update data",
            content,
            sha
          })
        }
      );
    }

    if(url.pathname=="/get"){
      return Response.json(await getData());
    }

    if(url.pathname=="/add"){
      let body = await req.json();
      let data = await getData();

      data.push({
        value: body.value,
        time: new Date().toISOString()
      });

      await saveData(data);

      return Response.json(data);
    }

    return new Response("OK");
  }
}

================= ENV VARIABLES =================
REPO = username/repo
TOKEN = github_token
